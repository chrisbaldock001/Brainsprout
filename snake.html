<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brainsprout — Snake</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .page {
      background: linear-gradient(160deg, #EEFCFB 0%, #FFF8F6 100%);
      justify-content: flex-start;
      padding: 0;
    }

    .blob-1 { background: var(--teal-light); opacity: 0.3; width: 250px; height: 250px; top: -60px; right: -60px; }
    .blob-2 { background: var(--coral-light); opacity: 0.25; width: 200px; height: 200px; bottom: 40px; left: -60px; }

    .snake-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px 24px;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    .snake-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .snake-scores {
      display: flex;
      gap: 10px;
    }

    .score-box {
      background: white;
      border-radius: 16px;
      padding: 8px 16px;
      text-align: center;
      box-shadow: var(--shadow);
      min-width: 64px;
      position: relative;
    }

    .score-box-hi { padding-right: 28px; }

    .score-label {
      font-size: 10px;
      font-weight: 800;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-val {
      font-family: 'Fredoka One', sans-serif;
      font-size: 22px;
      color: var(--teal);
    }

    .score-box-hi .score-val { color: var(--coral); }

    .clear-btn {
      position: absolute;
      top: 4px;
      right: 5px;
      background: none;
      border: none;
      font-size: 10px;
      color: var(--text-light);
      cursor: pointer;
      padding: 2px;
      line-height: 1;
      border-radius: 50%;
      transition: color 0.2s, background 0.2s;
    }
    .clear-btn:hover { color: var(--coral); background: var(--coral-pale); }

    .canvas-wrap {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 12px 48px rgba(77,191,184,0.18), 0 2px 8px rgba(0,0,0,0.06);
      border: 3px solid rgba(77,191,184,0.2);
      width: min(340px, calc(100vw - 32px));
      height: min(340px, calc(100vw - 32px));
    }

    #snake-canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #F0FAF9;
    }

    .snake-overlay {
      position: absolute;
      inset: 0;
      background: rgba(238,250,249,0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .snake-overlay.hidden { display: none; }

    .snake-overlay-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
      padding: 24px;
    }

    .snake-overlay-emoji { font-size: 48px; animation: float 2s ease-in-out infinite; }
    .snake-overlay-title { font-family: 'Fredoka One', sans-serif; font-size: 28px; color: var(--text-dark); }
    .snake-overlay-sub { font-size: 14px; font-weight: 600; color: var(--text-light); margin-bottom: 8px; }

    /* D-Pad */
    .dpad {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .dpad-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .dpad-btn {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      background: white;
      border: 2.5px solid var(--teal-light);
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(77,191,184,0.2);
      transition: transform 0.1s, background 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--teal);
      font-weight: 900;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .dpad-btn:active { transform: scale(0.9); background: var(--teal-pale); }

    .dpad-center {
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    /* Reset button */
    .reset-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      background: white;
      border: 2px solid #E0ECEB;
      border-radius: 50px;
      padding: 8px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 800;
      color: var(--text-light);
      cursor: pointer;
      z-index: 10;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .reset-btn:hover { color: var(--coral); border-color: var(--coral-light); background: var(--coral-pale); }

    @media (max-width: 400px) {
      .dpad-btn { width: 52px; height: 52px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="snake-inner">
      <div class="snake-header">
        <a href="activities.html" class="btn btn-outline" style="padding:8px 18px;font-size:13px;">← Back</a>
        <div class="snake-scores">
          <div class="score-box">
            <div class="score-label">Score</div>
            <div class="score-val" id="snake-score">0</div>
          </div>
          <div class="score-box score-box-hi">
            <div class="score-label">Best</div>
            <div class="score-val" id="snake-hi">0</div>
            <button class="clear-btn" onclick="clearHighScore()" title="Clear high score">✕</button>
          </div>
        </div>
      </div>

      <div class="canvas-wrap">
        <canvas id="snake-canvas"></canvas>
        <div class="snake-overlay" id="snake-overlay">
          <div class="snake-overlay-content">
            <div class="snake-overlay-emoji" id="overlay-emoji">🐍</div>
            <div class="snake-overlay-title" id="overlay-title">Snake</div>
            <div class="snake-overlay-sub" id="overlay-sub">Use arrow keys or buttons below</div>
            <button class="btn btn-teal" id="overlay-btn" onclick="startSnakeGame()">Play 🎮</button>
          </div>
        </div>
      </div>

      <div class="dpad">
        <div class="dpad-row">
          <button class="dpad-btn" onclick="snakeDir('UP')">▲</button>
        </div>
        <div class="dpad-row">
          <button class="dpad-btn" onclick="snakeDir('LEFT')">◀</button>
          <div class="dpad-center">🌿</div>
          <button class="dpad-btn" onclick="snakeDir('RIGHT')">▶</button>
        </div>
        <div class="dpad-row">
          <button class="dpad-btn" onclick="snakeDir('DOWN')">▼</button>
        </div>
      </div>
    </div>
  </div>

  <script src="utils.js"></script>
  <script src="snake.js"></script>
</body>
</html>
