<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brainsprout 🌿</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .page {
      background: linear-gradient(160deg, #FFF8F6 0%, #EEFCFB 60%, #F5F8FF 100%);
      justify-content: center;
      padding: 40px 24px;
    }

    .blob-1 { width: 300px; height: 300px; background: var(--coral-light); opacity: 0.4; top: -80px; right: -60px; }
    .blob-2 { width: 250px; height: 250px; background: var(--teal-light); opacity: 0.35; bottom: 40px; left: -80px; }
    .blob-3 { width: 180px; height: 180px; background: var(--butter); opacity: 0.5; top: 50%; left: 50%; transform: translate(-50%,-50%); }

    .start-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 480px;
      width: 100%;
    }

    .app-logo {
      font-family: 'Fredoka One', sans-serif;
      font-size: 48px;
      color: var(--coral);
      letter-spacing: -1px;
      margin-bottom: 6px;
      text-align: center;
      line-height: 1;
    }

    .app-tagline {
      font-size: 15px;
      color: var(--text-light);
      font-weight: 600;
      margin-bottom: 36px;
      letter-spacing: 0.5px;
    }

    .name-card {
      background: white;
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .name-card label {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-dark);
    }

    .name-card input {
      border: 2.5px solid var(--teal-light);
      border-radius: 14px;
      padding: 14px 18px;
      font-family: 'Nunito', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-dark);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: var(--teal-pale);
    }
    .name-card input::placeholder { color: var(--text-light); font-weight: 600; }
    .name-card input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 4px rgba(77,191,184,0.15);
    }

    /* Reset button — top right, index only */
    .reset-btn-index {
      position: fixed;
      top: 16px;
      right: 16px;
      background: white;
      border: 2px solid #E0ECEB;
      border-radius: 50px;
      padding: 8px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 800;
      color: var(--text-light);
      cursor: pointer;
      z-index: 10;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      display: none;
    }
    .reset-btn-index:hover { color: var(--coral); border-color: var(--coral-light); background: var(--coral-pale); }
    .reset-btn-index.visible { display: block; }

    @media (max-width: 400px) {
      .app-logo { font-size: 38px; }
    }
  </style>
</head>
<body>
  <button class="reset-btn-index" id="reset-btn" onclick="handleReset()" title="Start over">↺ Reset</button>

  <div class="page">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="start-inner">
      <div class="illus-row">
        <!-- Snail -->
        <svg class="illus" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="40" cy="36" r="18" fill="#FFDAB3" stroke="#FFB37A" stroke-width="2"/>
          <path d="M40 26 Q50 26 50 36 Q50 46 40 46 Q30 46 30 36 Q30 26 40 26Z" fill="#FFB37A" opacity="0.4"/>
          <circle cx="40" cy="36" r="8" fill="#FF8C5A" opacity="0.3"/>
          <ellipse cx="24" cy="46" rx="14" ry="8" fill="#A8E6E3"/>
          <circle cx="16" cy="44" r="3" fill="#4DBFB8"/>
          <line x1="16" y1="44" x2="14" y2="38" stroke="#4DBFB8" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="16" y1="44" x2="18" y2="38" stroke="#4DBFB8" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="14" cy="37" r="2" fill="#2D8A84"/>
          <circle cx="18" cy="37" r="2" fill="#2D8A84"/>
        </svg>
        <!-- Mushroom -->
        <svg class="illus" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="30" y="42" width="12" height="16" rx="4" fill="#FFE8A3"/>
          <ellipse cx="36" cy="42" rx="20" ry="14" fill="#FF7F6E"/>
          <circle cx="28" cy="36" r="4" fill="white" opacity="0.7"/>
          <circle cx="40" cy="32" r="5" fill="white" opacity="0.7"/>
          <circle cx="48" cy="38" r="3" fill="white" opacity="0.7"/>
          <ellipse cx="36" cy="56" rx="10" ry="3" fill="#E8D88A" opacity="0.5"/>
        </svg>
        <!-- Frog -->
        <svg class="illus" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="36" cy="44" rx="18" ry="14" fill="#B8E8C8"/>
          <circle cx="24" cy="30" r="7" fill="#B8E8C8"/>
          <circle cx="48" cy="30" r="7" fill="#B8E8C8"/>
          <circle cx="24" cy="29" r="4" fill="white"/>
          <circle cx="48" cy="29" r="4" fill="white"/>
          <circle cx="25" cy="29" r="2" fill="#2D3B36"/>
          <circle cx="49" cy="29" r="2" fill="#2D3B36"/>
          <path d="M29 48 Q36 54 43 48" stroke="#4A8A5A" stroke-width="2" stroke-linecap="round" fill="none"/>
          <path d="M18 56 Q14 62 10 60" stroke="#B8E8C8" stroke-width="3" stroke-linecap="round"/>
          <path d="M54 56 Q58 62 62 60" stroke="#B8E8C8" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <!-- Flower -->
        <svg class="illus" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="36" y1="60" x2="36" y2="36" stroke="#B8E8C8" stroke-width="3" stroke-linecap="round"/>
          <path d="M36 28 C36 20 26 18 26 28 C26 36 36 36 36 36 C36 36 46 36 46 28 C46 18 36 20 36 28Z" fill="#FFB3A7"/>
          <circle cx="28" cy="30" r="6" fill="#FFDAB3"/>
          <circle cx="44" cy="30" r="6" fill="#FFDAB3"/>
          <circle cx="36" cy="24" r="6" fill="#FFDAB3"/>
          <circle cx="36" cy="36" r="6" fill="#FFDAB3"/>
          <circle cx="36" cy="30" r="7" fill="#FF7F6E"/>
          <circle cx="36" cy="30" r="4" fill="#FFE8A3"/>
        </svg>
      </div>

      <h1 class="app-logo">🌿 Brainsprout</h1>
      <p class="app-tagline">Riddles, games &amp; general brain chaos</p>

      <div class="name-card">
        <label for="name-input">What's your name, genius?</label>
        <input type="text" id="name-input" placeholder="Type your name here..." maxlength="20" autocomplete="off" />
        <button class="btn btn-coral btn-full" onclick="submitName()">Let's go! 🚀</button>
      </div>
    </div>
  </div>

  <script src="utils.js"></script>
  <script>
    // ── CHECK IF NAME ALREADY SAVED ──
    window.addEventListener('DOMContentLoaded', () => {
      const saved = getPlayerName();
      if (saved) {
        // Returning user — skip straight to activities
        window.location.href = 'activities.html';
      }
    });

    // Show reset button only if a name exists (i.e. user navigated back manually)
    // This is handled by the redirect above, but guard for edge cases
    const resetBtn = document.getElementById('reset-btn');
    if (getPlayerName()) resetBtn.classList.add('visible');

    // ── SUBMIT NAME ──
    document.getElementById('name-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitName();
    });

    function submitName() {
      const val = document.getElementById('name-input').value.trim();
      if (!val) {
        const input = document.getElementById('name-input');
        input.focus();
        input.style.borderColor = 'var(--coral)';
        setTimeout(() => input.style.borderColor = '', 1000);
        return;
      }
      const name = val.charAt(0).toUpperCase() + val.slice(1);
      setPlayerName(name);
      window.location.href = 'activities.html';
    }

    function handleReset() {
      if (confirm('Reset everything and start over?')) resetPlayer();
    }
  </script>
</body>
</html>
